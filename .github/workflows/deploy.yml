name: Deploy Honra ao Mérito

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite disparo manual pela interface do GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gera js/config.js a partir dos GitHub Secrets — nunca exposto no repositório
      - name: Gerar config.js a partir dos Secrets
        env:
          GITHUB_OWNER: ${{ secrets.CONFIG_GITHUB_OWNER }}
          GITHUB_REPO: ${{ secrets.CONFIG_GITHUB_REPO }}
          GITHUB_PAT: ${{ secrets.CONFIG_GITHUB_PAT }}
          TEAM_PASSWORD: ${{ secrets.CONFIG_TEAM_PASSWORD }}
        run: |
          cat > js/config.js << 'JSEOF'
          // Gerado automaticamente pelo GitHub Actions — não editar
          const CONFIG = {
            GITHUB_OWNER:  "PLACEHOLDER_OWNER",
            GITHUB_REPO:   "PLACEHOLDER_REPO",
            GITHUB_BRANCH: "main",
            GITHUB_PAT:    "PLACEHOLDER_PAT",
            TEAM_PASSWORD: "PLACEHOLDER_PASSWORD",
            MEMBERS: [
              { id: "marcelo", name: "Marcelo", avatar: "🧑‍💻" },
              { id: "paloma",  name: "Paloma",  avatar: "👩‍💻" },
              { id: "beatriz", name: "Beatriz", avatar: "👩‍🔬" },
              { id: "leandro", name: "Leandro", avatar: "🧑‍🚀" },
              { id: "su",      name: "Su",      avatar: "👨‍💻" },
              { id: "pedro",   name: "Pedro",   avatar: "🧑‍💼" },
              { id: "calvin",  name: "Calvin",  avatar: "🧙" },
              { id: "arthur",  name: "Arthur",  avatar: "🦾" },
              { id: "tanaka",  name: "Tanaka",  avatar: "🥷" },
              { id: "victor",  name: "Victor",  avatar: "🧑‍🔧" },
            ],
          };
          const MERITS = [
            { key: "works_on_my_machine",  emoji: "🖥️",  title: "Works on my Machine",       description: "A desculpa padrão de todos os tempos.",                            badge: { backgroundColor: "#0d1117", borderColor: "#39d353", textColor: "#e6edf3", shape: "hexagon" } },
            { key: "testador_producao",    emoji: "🔥",  title: "Testador em Produção",       description: "Para quem sempre pula o ambiente de homologação.",                 badge: { backgroundColor: "#1a0a00", borderColor: "#ff6b35", textColor: "#e6edf3", shape: "shield"  } },
            { key: "senhor_cache",         emoji: "🗄️",  title: "Senhor do Cache",            description: "Sempre acusa o Redis e acha que flush resolve tudo.",              badge: { backgroundColor: "#0a0a1a", borderColor: "#7c6af7", textColor: "#e6edf3", shape: "circle"  } },
            { key: "pythonista_purista",   emoji: "🐍",  title: "Pythonista Purista",         description: "Quer resolver absolutamente tudo com um script Python.",           badge: { backgroundColor: "#001a00", borderColor: "#3fb950", textColor: "#e6edf3", shape: "hexagon" } },
            { key: "sobrevivente_mysql",   emoji: "💀",  title: "Sobrevivente do MySQL",      description: "Fez um UPDATE ou DELETE sem WHERE e continua empregado.",          badge: { backgroundColor: "#1a0000", borderColor: "#f85149", textColor: "#e6edf3", shape: "star"    } },
            { key: "commitador_sexta",     emoji: "📅",  title: "Commitador de Sexta",        description: "O corajoso que adora deploy no fim do expediente.",                badge: { backgroundColor: "#1a1000", borderColor: "#e3b341", textColor: "#e6edf3", shape: "shield"  } },
            { key: "ctrl_c_ctrl_v",        emoji: "📋",  title: "Ctrl+C / Ctrl+V",           description: "Sênior especializado em respostas do Stack Overflow e do Gepeto.", badge: { backgroundColor: "#0a1a1a", borderColor: "#58a6ff", textColor: "#e6edf3", shape: "circle"  } },
            { key: "refatorador_infinito", emoji: "♾️",  title: "Refatorador Infinito",       description: "Reescreve o código três vezes e nunca entrega a feature.",         badge: { backgroundColor: "#1a0a1a", borderColor: "#bc8cff", textColor: "#e6edf3", shape: "hexagon" } },
            { key: "gdd",                  emoji: "🎰",  title: "GDD - Gambiarra Driven Dev", description: "Especialista em soluções temporárias que duram para sempre.",      badge: { backgroundColor: "#1a1a00", borderColor: "#d29922", textColor: "#e6edf3", shape: "star"    } },
          ];
          JSEOF
          # Substitui os placeholders pelos valores reais dos Secrets
          sed -i "s|PLACEHOLDER_OWNER|${GITHUB_OWNER}|g"     js/config.js
          sed -i "s|PLACEHOLDER_REPO|${GITHUB_REPO}|g"       js/config.js
          sed -i "s|PLACEHOLDER_PAT|${GITHUB_PAT}|g"         js/config.js
          sed -i "s|PLACEHOLDER_PASSWORD|${TEAM_PASSWORD}|g" js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
