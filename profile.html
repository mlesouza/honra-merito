<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — Honra ao Mérito</title>
  <script>(function(){var t=localStorage.getItem("honra_merito_theme")||"terminal";document.documentElement.setAttribute("data-theme",t);})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="page-loader" class="page-loader" role="status" aria-label="Carregando...">
    <div class="page-loader__inner">
      <div class="page-loader__logo">🏆</div>
      <div class="page-loader__ring"></div>
      <p class="page-loader__text">Honra ao Mérito</p>
      <div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
  </div>
  <header class="site-header">
    <div class="container">
      <div class="site-header__inner">
        <nav class="breadcrumb">
          <a href="index.html" class="breadcrumb__link">🏆 Honra ao Mérito</a>
          <span class="breadcrumb__sep" aria-hidden="true">/</span>
          <span class="breadcrumb__current">Perfil</span>
        </nav>
        <div class="site-header__controls">
          <div id="theme-switcher"></div>
          <div id="user-bar" class="user-bar"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">

    <div id="loading-state" class="loading-state" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <span class="loading-text">Carregando perfil...</span>
    </div>

    <div id="error-state" class="error-banner" hidden role="alert"></div>

    <div id="profile-content" hidden>

      <section class="profile-header" aria-label="Informações do membro">
        <div class="profile-avatar-wrap" id="profile-avatar-wrap">
          <div class="profile-header__avatar" id="profile-avatar" aria-hidden="true">🧑‍💻</div>
          <label class="avatar-upload-btn" id="avatar-upload-label" hidden
            title="Trocar foto de perfil" aria-label="Trocar foto de perfil">
            📷
            <input type="file" id="avatar-file-input" accept="image/*" class="avatar-file-input" />
          </label>
        </div>
        <div class="profile-header__info">
          <h1 class="profile-header__name" id="profile-name">Carregando...</h1>
          <p class="profile-header__total" id="profile-total">0 méritos</p>
          <div id="avatar-upload-status" class="status-message" hidden aria-live="polite"></div>
        </div>
      </section>

      <!-- Estatísticas do membro -->
      <div class="profile-stats-bar" id="profile-stats" aria-label="Estatísticas do membro">
        <!-- Renderizado via profile.js -->
      </div>

      <section class="section" aria-labelledby="showcase-heading">
        <div class="section__header-row">
          <h2 class="section__title" id="showcase-heading">
            <span aria-hidden="true">🎖️</span> Conquistas
          </h2>
          <button class="secret-hint-btn" id="secret-hint-btn" aria-label="Conquistas secretas" hidden>
            <span class="secret-hint-btn__icon">🔮</span>
            <span class="secret-hint-btn__label">Segredos</span>
          </button>
        </div>
        <div id="badge-showcase" class="badge-showcase" aria-label="Vitrine de badges do membro"></div>
      </section>

      <section class="section" aria-labelledby="history-heading">
        <h2 class="section__title" id="history-heading">
          <span aria-hidden="true">📋</span> Histórico de Méritos
        </h2>
        <div id="merit-history" class="merit-history" aria-label="Histórico completo de méritos"></div>
      </section>

    </div>

  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="index.html" class="footer-link">← Voltar ao ranking</a>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/badge-generator.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/profile.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>Theme.renderSwitcher(document.getElementById("theme-switcher")));</script>
</body>
</html>
